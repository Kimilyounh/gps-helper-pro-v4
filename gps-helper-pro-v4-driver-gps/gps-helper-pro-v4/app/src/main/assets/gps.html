<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>GPS Helper Pro v4</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"><style>
:root{--bg:#0f172a;--card:#111c34;--muted:#94a3b8;--ok:#22c55e;--warn:#f59e0b;--bad:#ef4444;--blue:#38bdf8}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#0f172a,#111827);color:white;font-family:system-ui,-apple-system,"Apple SD Gothic Neo",sans-serif;padding:calc(env(safe-area-inset-top) + 12px) 12px calc(env(safe-area-inset-bottom) + 12px)}.top{position:sticky;top:calc(env(safe-area-inset-top) + 6px);z-index:9;padding:12px;border-radius:18px;background:#12301e;border:1px solid #1f8f4d;box-shadow:0 12px 32px #0008;margin-bottom:12px;font-weight:800}.top.warn{background:#3a2709;border-color:#f59e0b}.top.bad{background:#3a1111;border-color:#ef4444}.title{font-size:22px;font-weight:900;margin:2px 0 12px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.card{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.10);border-radius:18px;padding:14px;box-shadow:0 8px 22px #0003}.big{font-size:42px;font-weight:900;line-height:1}.label{font-size:13px;color:var(--muted);margin-bottom:8px}.val{font-size:20px;font-weight:800;word-break:break-all}.score{height:12px;background:#334155;border-radius:99px;overflow:hidden;margin-top:10px}.score div{height:100%;width:0;background:var(--ok);transition:.3s}.btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0}.btn{border:0;border-radius:16px;padding:16px 10px;color:white;font-weight:900;font-size:16px}.primary{background:#2563eb}.green{background:#16a34a}.gray{background:#475569}.red{background:#dc2626}#map{height:42vh;min-height:310px;border-radius:18px;margin-top:12px;overflow:hidden}.log{max-height:180px;overflow:auto;font-family:ui-monospace,monospace;font-size:12px;color:#cbd5e1}.row{display:flex;justify-content:space-between;gap:8px;padding:7px 0;border-bottom:1px solid #ffffff12}.driver{font-size:18px;text-align:center}.driver .big{font-size:64px}.pill{display:inline-block;padding:5px 10px;border-radius:999px;background:#ffffff16;color:#cbd5e1;font-size:12px}.notice{color:#fbbf24;font-size:13px;line-height:1.45}.mono{font-family:ui-monospace,monospace;font-size:13px}.full{grid-column:1/3}
</style></head><body><div id="banner" class="top">🟢 GPS 대기 — 새로고침 또는 운행 시작</div><div class="title">🛰 GPS Helper Pro v4</div>
<div class="card driver"><div id="statusText" class="pill">대기중</div><div id="mainAcc" class="big">--m</div><div id="scoreText">GPS 품질 --점</div><div class="score"><div id="scoreBar"></div></div></div>
<div class="grid" style="margin-top:10px"><div class="card"><div class="label">속도</div><div id="speed" class="val">-- km/h</div></div><div class="card"><div class="label">방향</div><div id="heading" class="val">--</div></div><div class="card"><div class="label">LTE/5G 상태</div><div id="network" class="val">확인중</div></div><div class="card"><div class="label">오늘 GPS 끊김</div><div id="dropCount" class="val">0회</div></div><div class="card"><div class="label">현재 좌표</div><div id="coord" class="val mono">--</div></div><div class="card"><div class="label">마지막 갱신</div><div id="age" class="val">--</div></div></div>
<div class="btns"><button class="btn primary" onclick="refreshGps()">📡 GPS 새로고침</button><button id="driveBtn" class="btn green" onclick="toggleDrive()">🚖 운행 시작</button><button id="autoBtn" class="btn gray" onclick="toggleAuto()">🔄 자동점검 OFF</button><button class="btn gray" onclick="copyCoord()">📍 좌표 복사</button><button class="btn gray" onclick="shareCsv()">📁 CSV 공유</button><button class="btn gray" onclick="resetDropCount()">📊 끊김 초기화</button></div>
<div class="card notice">대리운전 GPS 안정화 보조 모드: GPS 신호 약화·미갱신·끊김을 감지해 경고, 진동, 음성 안내를 제공합니다. 다른 앱의 배차 서버나 알고리즘은 제어하지 않습니다.</div><div id="map"></div>
<div class="card" style="margin-top:12px"><div class="label">최근 GPS 품질 로그</div><div id="log" class="log"></div></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><script>
let map=L.map('map').setView([37.5665,126.9780],15), marker=null,circle=null,line=null,path=[],logs=[],watch=null,auto=false,drive=false,timer=null,lastTs=0,lastCoord='',lastAlert=0,lastNet=0;
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OSM'}).addTo(map);
const todayKey=()=>new Date().toISOString().slice(0,10);function getDrops(){let d=JSON.parse(localStorage.gpsDrops||'{}');return d[todayKey()]||0}function setDrops(n){let d=JSON.parse(localStorage.gpsDrops||'{}');d[todayKey()]=n;localStorage.gpsDrops=JSON.stringify(d);document.getElementById('dropCount').textContent=n+'회'}setDrops(getDrops());
function incDrop(reason){setDrops(getDrops()+1);alertVoice(reason||'GPS 신호가 끊겼습니다');}
function score(acc,age){let s=100;if(acc>10)s-=10;if(acc>20)s-=20;if(acc>30)s-=25;if(acc>60)s-=25;if(age>30000)s-=30;return Math.max(0,s)}
function grade(acc,age){if(age>60000)return ['bad','🔴 위치 미갱신']; if(acc<=10)return ['ok','🟢 GPS 매우 좋음']; if(acc<=20)return ['ok','🟢 GPS 좋음']; if(acc<=30)return ['warn','🟡 GPS 보통']; if(acc<=60)return ['warn','🟠 GPS 약함 — 재측정 권장']; return ['bad','🔴 GPS 위험 — 야외 이동 권장']}
function kmh(v){return v==null?'-- km/h':(v*3.6).toFixed(1)+' km/h'}function dir(h){if(h==null||isNaN(h))return'--';return ['N','NE','E','SE','S','SW','W','NW'][Math.round(h/45)%8]+' '+Math.round(h)+'°'}
function setBanner(type,text){let b=document.getElementById('banner');b.className='top '+(type==='ok'?'':type);b.textContent=text}
function alertVoice(text){if(Date.now()-lastAlert<30000)return;lastAlert=Date.now();if(navigator.vibrate)navigator.vibrate([300,150,300]);if(window.AndroidBridge&&AndroidBridge.speak)AndroidBridge.speak(text)}
function draw(lat,lng,acc){map.setView([lat,lng],18);if(!marker)marker=L.marker([lat,lng]).addTo(map);else marker.setLatLng([lat,lng]);if(!circle)circle=L.circle([lat,lng],{radius:acc,color:'#38bdf8',fillOpacity:.12}).addTo(map);else{circle.setLatLng([lat,lng]);circle.setRadius(acc)}path.push([lat,lng]);if(path.length>300)path.shift();if(!line)line=L.polyline(path,{weight:4}).addTo(map);else line.setLatLngs(path)}
function addLog(acc,lat,lng,s,msg){logs.unshift({time:new Date().toLocaleTimeString('ko-KR'),acc:Math.round(acc),lat,lng,score:s,msg:msg||''});logs=logs.slice(0,100);document.getElementById('log').innerHTML=logs.map(x=>`<div class=row><span>${x.time}</span><span>${x.acc}m / ${x.score}점 ${x.msg}</span></div>`).join('')}
function handle(p){let c=p.coords, age=Date.now()-p.timestamp, acc=c.accuracy, sc=score(acc,age), g=grade(acc,age);lastTs=Date.now();lastCoord=c.latitude.toFixed(6)+', '+c.longitude.toFixed(6);draw(c.latitude,c.longitude,acc);document.getElementById('mainAcc').textContent=Math.round(acc)+'m';document.getElementById('scoreText').textContent='GPS 품질 '+sc+'점';document.getElementById('scoreBar').style.width=sc+'%';document.getElementById('speed').textContent=kmh(c.speed);document.getElementById('heading').textContent=dir(c.heading);document.getElementById('coord').textContent=lastCoord;document.getElementById('age').textContent=Math.round(age/1000)+'초 전';document.getElementById('statusText').textContent=g[1];setBanner(g[0],g[1]+(auto?' / 자동점검 ON':''));addLog(acc,c.latitude,c.longitude,sc);if(acc>60){incDrop('GPS 정확도가 매우 낮습니다')}else if(acc>30){alertVoice('GPS 정확도가 낮습니다')};updateNetwork()}
function err(e){setBanner('bad','🔴 GPS 오류 — 권한/GPS 설정 확인');document.getElementById('statusText').textContent=e.message||'GPS 오류';incDrop('GPS 신호가 끊겼습니다')}
function refreshGps(){if(watch)navigator.geolocation.clearWatch(watch);watch=navigator.geolocation.watchPosition(handle,err,{enableHighAccuracy:true,maximumAge:0,timeout:20000});setBanner('warn','🛰 최신 GPS 신호 수신 중...')}
function toggleAuto(){auto=!auto;document.getElementById('autoBtn').textContent=auto?'🔄 자동점검 ON':'🔄 자동점검 OFF';document.getElementById('autoBtn').className='btn '+(auto?'green':'gray');if(auto){refreshGps();timer=setInterval(()=>{if(Date.now()-lastTs>30000){setBanner('bad','🔴 30초 이상 위치 미갱신 — 자동 복구');incDrop('위치 갱신이 멈췄습니다');refreshGps()}updateNetwork()},20000)}else{clearInterval(timer)}}
function toggleDrive(){drive=!drive;document.getElementById('driveBtn').textContent=drive?'⏹ 운행 종료':'🚖 운행 시작';document.getElementById('driveBtn').className='btn '+(drive?'red':'green');if(drive){if(!auto)toggleAuto();if(window.AndroidBridge)AndroidBridge.startService()}else{if(window.AndroidBridge)AndroidBridge.stopService()}}
function copyCoord(){if(!lastCoord){alert('좌표가 아직 없습니다');return} if(window.AndroidBridge)AndroidBridge.copyText(lastCoord); else navigator.clipboard&&navigator.clipboard.writeText(lastCoord)}
function updateNetwork(){if(Date.now()-lastNet<10000)return;lastNet=Date.now();try{if(window.AndroidBridge&&AndroidBridge.getNetworkInfo){let n=JSON.parse(AndroidBridge.getNetworkInfo());document.getElementById('network').textContent=(n.detail||n.type)+' '+(n.strength&&n.strength!='--'?n.strength:'')}}catch(e){document.getElementById('network').textContent='확인 제한'}}
function shareCsv(){let csv='time,accuracy,score,lat,lng,msg\n'+logs.map(x=>`${x.time},${x.acc},${x.score},${x.lat},${x.lng},${x.msg}`).join('\n');if(window.AndroidBridge)AndroidBridge.shareCsv(csv);else alert(csv)}
function resetDropCount(){setDrops(0)}
setInterval(()=>{if(lastTs){let sec=Math.round((Date.now()-lastTs)/1000);document.getElementById('age').textContent=sec+'초 전';if(auto&&sec>60){setBanner('bad','🔴 위치 미갱신 '+sec+'초');alertVoice('위치 갱신이 멈췄습니다')}}},1000);updateNetwork();
</script></body></html>
